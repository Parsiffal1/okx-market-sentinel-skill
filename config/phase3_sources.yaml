version: 1

workdir: /root/work/crypto-agent

cache_paths:
  raw_dir: /root/work/crypto-agent/context/raw
  final_cache: /root/work/crypto-agent/context/context_cache.json

sources:
  okx_market:
    enabled: true
    role:
      - social
      - hot_symbols
    update_interval_minutes: 30
    timeout_seconds: 45
    commands:
      - market filter --instType SWAP --sortBy chg24hPct
      - market filter --instType FUTURES --sortBy chg24hPct
      - market filter --instType SWAP --sortBy oiUsd
      - market filter --instType FUTURES --sortBy oiUsd
      - market oi-change --instType SWAP --bar 4H
      - market oi-change --instType FUTURES --bar 4H

  okx_positions:
    enabled: true
    role:
      - holdings
    update_interval_minutes: 5
    timeout_seconds: 30
    profiles:
      - live
      - demo

  jin10:
    enabled: true
    role:
      - macro
    update_interval_minutes: 30
    timeout_seconds: 30
    transport: mcp_streamable_http
    url: https://mcp.jin10.com/mcp
    auth_env: JIN10_MCP_TOKEN
    functions:
      - list_flash
      - list_news
      - list_calendar

  blockbeats:
    enabled: true
    role:
      - macro
      - market_context
      - crypto_news
    update_interval_minutes: 30
    timeout_seconds: 30
    endpoints:
      - get_newsflash
      - get_articles
      - get_btc_etf_flow
      - get_ibit_fbtc_flow
      - get_stablecoin_marketcap
      - get_daily_onchain_tx
      - get_us_treasury_yield
      - get_dxy_index
      - get_m2_supply
      - get_contract_oi_data
      - get_sentiment_indicator

  cmc:
    enabled: true
    role:
      - macro
      - market_context
    update_interval_minutes: 30
    timeout_seconds: 30
    auth_env: CMC_API_KEY
    endpoints:
      - /v1/key/info
      - /v1/global-metrics/quotes/latest
      - /v3/fear-and-greed/latest
      - /v1/altcoin-season-index/latest
      - /v1/cryptocurrency/listings/latest
      - /v2/cryptocurrency/quotes/latest
      - /v1/cryptocurrency/ohlcv/latest
      - /v2/cryptocurrency/price-performance-stats/latest
      - /v1/cryptocurrency/trending/latest
      - /v1/cryptocurrency/trending/gainers-losers

  moss_xsignal:
    enabled: true
    role:
      - macro
      - social_sentiment
    update_interval_minutes: 30
    timeout_seconds: 30
    endpoints:
      - /sentiment/global/list
      - /sentiment-edge/available-dates

  okx_news:
    enabled: true
    role:
      - crypto_news
    update_interval_minutes: 30
    timeout_seconds: 30
    commands:
      - news latest
      - news important
      - news sentiment-rank

  opennews:
    enabled: true
    role:
      - crypto_news
    update_interval_minutes: 30
    timeout_seconds: 30
    endpoints:
      - /open/news_type
      - /open/news_search

  opentwitter:
    enabled: true
    role:
      - social
    update_interval_minutes: 30
    timeout_seconds: 30
    whitelist_mode: true
    watch_accounts:
      - roger73005305
      - thankUcrypto
      - xtony1314
      - wukong2021
      - jackli727
    endpoints:
      - /open/twitter_user_info
      - /open/twitter_user_tweets
      - /open/twitter_search
      - /open/twitter_deleted_tweets
      - /open/twitter_follower_events
