version: 1

cache_policy:
  aggregation_interval_minutes: 15
  allow_partial_updates: true
  stale_policy: keep_last_good

staleness_threshold_minutes:
  holdings: 15
  macro: 240
  crypto_news: 120
  social: 120
  market_context: 240

enum_values:
  macro_regime: [bullish, neutral, bearish, unknown]
  risk_level: [low, medium, high, extreme, unknown]
  directional_bias: [bullish, slightly_bullish, neutral, slightly_bearish, bearish, mixed, unknown]
  flow_state: [positive, slightly_positive, neutral, slightly_negative, negative, mixed, unknown]
  liquidity_state: [expanding, flat, contracting, unknown]
  activity_state: [high, medium, low, unknown]

macro_regime_rules:
  score_to_regime:
    bullish_min: 2
    bearish_max: -2
  geo_risk_penalty:
    medium: -1
    high: -2
  pre_or_recent_event_penalty: -1
  fear_greed_score:
    extreme_fear: -2
    fear: -1
    neutral: 0
    greed: 1
    extreme_greed: 1
  market_breadth_score:
    broad_risk_off: -1
    mixed: 0
    broad_risk_on: 1

